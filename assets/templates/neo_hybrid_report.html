<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #000; margin: 0; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: white; border: 3px solid #000; border-radius: 32px; padding: 40px; box-shadow: 10px 10px 0px #000; }
        h1 { font-weight: 800; letter-spacing: -0.05em; font-size: 32px; border-bottom: 3px solid #000; padding-bottom: 10px; margin-top: 0; }
        .section { margin-bottom: 30px; }
        .section-title { font-family: 'JetBrains Mono', monospace; font-size: 14px; text-transform: uppercase; background: #000; color: #fff; display: inline-block; padding: 2px 8px; border-radius: 4px; margin-bottom: 15px; }
        .content { line-height: 1.6; color: #334155; }
        .footer { margin-top: 50px; font-size: 12px; text-align: center; color: #94A3B8; border-top: 1px solid #E2E8F0; padding-top: 20px; }
        ul { padding-left: 20px; }
        .tag { background: #E9D5FF; border: 1px solid #000; border-radius: 99px; padding: 2px 12px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        
        {% for section in sections %}
        <div class="section">
            <span class="section-title">{{ section.label }}</span>
            <div class="content">
                {{ section.content | safe }}
            </div>
        </div>
        {% endfor %}

        <div class="footer">
            <p>Generated by Mema | Multi-Euristic Mind Automaton</p>
            <p>&copy; 2026 Glass Gallery Tech. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
