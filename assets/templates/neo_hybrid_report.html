<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #EFE9DC; color: #2A2520; margin: 0; padding: 48px; }
        .container { max-width: 800px; margin: auto; background: #EEE8DB; border: 1px solid #CBC3B7; border-radius: 4px; padding: 40px; }
        h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; letter-spacing: -0.03em; font-size: 32px; border-bottom: 1px solid #CBC3B7; padding-bottom: 12px; margin-top: 0; color: #2A2520; }
        .section { margin-bottom: 30px; }
        .section-title { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; background: #2A2520; color: #EFE9DC; display: inline-block; padding: 4px 10px; border-radius: 4px; margin-bottom: 15px; font-weight: 600; }
        .content { line-height: 1.6; color: #2A2520; }
        .footer { margin-top: 50px; font-family: 'JetBrains Mono', monospace; font-size: 10px; text-align: center; color: #6F675D; border-top: 1px solid #CBC3B7; padding-top: 20px; letter-spacing: 0.1em; text-transform: uppercase; }
        ul { padding-left: 20px; }
        .tag { background: #EFE9DC; border: 1px solid #CBC3B7; border-radius: 4px; padding: 4px 12px; font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 600; letter-spacing: 0.1em; color: #6F675D; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>

        {% for section in sections %}
        <div class="section">
            <span class="section-title">{{ section.label }}</span>
            <div class="content">
                {{ section.content | safe }}
            </div>
        </div>
        {% endfor %}

        <div class="footer">
            <p>Generated by Mema | Multi-Euristic Mind Automaton</p>
            <p>&copy; 2026 Glass Gallery Tech. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
